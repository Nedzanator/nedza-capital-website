name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify site files
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f thank-you.html
          ! grep -q 'TODO' index.html || (echo 'Remove TODO from index.html' && exit 1)
