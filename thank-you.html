<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for contacting Nedza Capital Partners. We will be in touch shortly." />
  <title>Thank You | Nedza Capital Partners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0d1f35;
      --gold: #b88933;
      --gold-soft: #a97b2d;
      --gold-light: #d4b896;
      --off-white: #fdfcfb;
      --text-body: #33475b;
      --border: #ddd8d0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--navy);
      color: var(--off-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 6vw;
      text-align: center;
      font-size: 19px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 80% 50%, rgba(30, 61, 92, 0.7) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(184, 137, 51, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .thank-you-card {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
    }

    .thank-you-rule {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 2rem;
    }

    .thank-you-eyebrow {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      font-weight: 300;
      line-height: 1.15;
      color: #f0ece6;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1.08rem;
      font-weight: 300;
      line-height: 1.85;
      color: #b9c4d0;
      margin-bottom: 2.5rem;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      font-size: 0.84rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--navy);
      background: var(--gold);
      padding: 1rem 2rem;
      transition: background 0.25s, transform 0.2s;
    }

    .btn-home:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
    }

    .btn-home:focus-visible {
      outline: 2px solid var(--gold-light);
      outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      .btn-home {
        transition: none;
      }
      .btn-home:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <div class="thank-you-rule"></div>
    <p class="thank-you-eyebrow">Nedza Capital Partners</p>
    <h1>Thank you.</h1>
    <p>Your message has been received. We will be in touch shortly. All conversations are confidential.</p>
    <a href="/" class="btn-home">Return to homepage</a>
  </div>
</body>
</html>
